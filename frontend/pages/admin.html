<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <title>Admin - KairoDEX</title>

  <link rel="stylesheet" href="/styles/style.css">

</head>

<body>

  <main class="admin-page">

    <h1>Painel Admin</h1>

    <div class="admin-form">

      <input
        type="text"
        id="manga-id"
        placeholder="ID do mangá"
      >

      <input
        type="text"
        id="chapter-number"
        placeholder="Número do capítulo"
      >

      <input
        type="text"
        id="chapter-title"
        placeholder="Título do capítulo"
      >

      <input
        type="file"
        id="chapter-pages"
        multiple
        accept="image/*"
      >

      <div id="preview-pages"></div>

      <button id="upload-btn">
        Publicar capítulo
      </button>

      <hr>

<h2>Excluir capítulo</h2>

<input
  type="text"
  id="delete-chapter-id"
  placeholder="ID do documento do capítulo"
>

<button id="delete-chapter-btn">
  Excluir capítulo
</button>

    </div>

    <div id="upload-status"></div>

  </main>

  <script type="module" src="/scripts/admin.js"></script>

</body>

</html>
